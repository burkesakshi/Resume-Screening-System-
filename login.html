<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Resume Screening</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'success' if category == 'success' else 'error' }}" style="margin-bottom: 20px;">
                    <i class="fas {% if category == 'success' %}fa-check-circle{% else %}fa-exclamation-triangle{% endif %}"></i>
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                
                <h1>Login</h1>
                <p>Welcome back! Sign in to your account</p>
            </div>
            
            <form method="POST" id="loginForm">
                <!-- Email -->
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required>
                </div>
                
                <!-- Password -->
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Password
                    </label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>
                
                <!-- Submit -->
                <button type="submit" class="submit-btn">
                    <i class="fas fa-arrow-right"></i> Sign In
                </button>
            </form>
            
            <!-- Register Link -->
            <div class="login-footer">
                <p>Don't have an account? 
                    <a href="{{ url_for('register') }}" class="register-link">
                        <i class="fas fa-user-plus"></i> Register Here
                    </a>
                </p>
            </div>
        </div>
    </div>

    <script>
        // Simple login validation
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                e.preventDefault();
                alert('Please fill email and password!');
                return false;
            }
        });
    </script>
</body>
</html>
