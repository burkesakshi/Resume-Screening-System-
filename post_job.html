<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post New Job - Admin</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem 0;
        }
        
        .job-form-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .form-header {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            padding: 2.5rem;
            text-align: center;
        }
        
        .form-header i { font-size: 3rem; margin-bottom: 1rem; }
        .form-header h1 { font-size: 2.2rem; margin-bottom: 0.5rem; }
        
        .form-body {
            padding: 3rem;
        }
        
        .form-group {
            margin-bottom: 2rem;
        }
        
        .form-label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
        }
        
        .form-control {
            width: 100%;
            padding: 1rem 1.5rem;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        .form-control:focus {
            outline: none;
            border-color: #28a745;
            box-shadow: 0 0 0 3px rgba(40,167,69,0.1);
        }
        
        .form-control.textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .skills-input {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 1rem;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            min-height: 50px;
            align-items: center;
        }
        
        .skills-input:focus-within {
            border-color: #28a745;
            box-shadow: 0 0 0 3px rgba(40,167,69,0.1);
        }
        
        .skill-tag {
            background: #28a745;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .skill-input {
            border: none;
            outline: none;
            flex: 1;
            font-size: 1rem;
            background: transparent;
        }
        
        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }
        
        .btn {
            padding: 1.2rem 3rem;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(40,167,69,0.4);
        }
        
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-3px);
        }
        
        @media (max-width: 768px) {
            .form-body { padding: 2rem 1.5rem; }
            .button-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="job-form-container">
        <div class="form-header">
            <i class="fas fa-briefcase"></i>
            <h1>Post New Job</h1>
            <p>Create attractive job posting for candidates</p>
        </div>
        
        <form method="POST" class="form-body">
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-building"></i> Company Name
                </label>
                <input type="text" name="company_name" class="form-control" required 
                       placeholder="e.g., Google, Microsoft, Tesla">
            </div>
            
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-user-tie"></i> Job Title
                </label>
                <input type="text" name="job_title" class="form-control" required 
                       placeholder="e.g., Senior Python Developer">
            </div>
            
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-cogs"></i> Required Skills
                </label>
                <div class="skills-input">
                    <input type="text" name="skills" class="skill-input" placeholder="Add skills (comma separated)">
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-clock"></i> Experience Required
                </label>
                <select name="experience" class="form-control" required>
                    <option value="">Select experience level</option>
                    <option value="0-1 Year">0-1 Year</option>
                    <option value="1-3 Years">1-3 Years</option>
                    <option value="3-5 Years">3-5 Years</option>
                    <option value="5+ Years">5+ Years</option>
                    <option value="Fresher">Fresher</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">
                    <i class="fas fa-file-alt"></i> Job Description
                </label>
                <textarea name="job_description" class="form-control textarea" required 
                          placeholder="Describe the job role, responsibilities, benefits..."></textarea>
            </div>
            
            <div class="button-group">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-paper-plane"></i>
                    Post Job
                </button>
                <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">
                    <i class="fas fa-arrow-left"></i>
                    Cancel
                </a>
            </div>
        </form>
    </div>
</body>
</html>
